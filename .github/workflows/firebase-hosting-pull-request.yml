name: Deploy to Firebase Hosting on release

on:
  release:
    types: [published]

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Extract Firebase Config
        run: 'echo "$FIREBASE" > src/firebase.ts'
        env:
          FIREBASE: ${{secrets.FIREBASE}}
      - run: npm install
      - run: npm run build
      - run: cp go.js dist/
      - uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_OTOHIME_WEB }}"
          projectId: otohime-web
          channelId: live
