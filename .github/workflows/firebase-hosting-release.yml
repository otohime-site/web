name: Deploy to Firebase Hosting on release

on:
  release:
    types: [published]

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Extract Firebase Config
        run: 'echo "$FIREBASE" > src/firebase.ts'
        env:
          FIREBASE: ${{secrets.FIREBASE}}
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: cp go.js dist/
      - uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0.10.0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_OTOHIME_WEB }}"
          projectId: otohime-web
          channelId: live
